name: Deploy Backend + Embedded React

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      # 1. Inject Production Environment
      - name: Create Production .env File
        run: |
          cd backend
          echo "APP_ENV=production" >> .env
          echo "APP_DEBUG=false" >> .env
          echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=${{ secrets.PRODUCTION_DB_HOST }}" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=${{ secrets.PRODUCTION_DB_NAME }}" >> .env
          echo "DB_USERNAME=${{ secrets.PRODUCTION_DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.PRODUCTION_DB_PASS }}" >> .env

      # 2. Install production PHP packages on the cloud runner
      - name: Install Laravel Dependencies
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader --prefer-dist --no-progress

      # 3. ZIP ONLY THE BACKEND (React is already inside backend/public!)
      - name: Zip Backend Directory
        run: |
          zip -r release.zip backend/

      # 4. Upload just the single archive file over FTP
      - name: Upload Zip via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.SERVER_DIR }}
          local-dir: ./