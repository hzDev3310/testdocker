name: Super-Fast Local Zip Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Pull your repository code into the runner workspace
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up PHP briefly to allow zip commands to bundle files smoothly
      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      # Step 3: Inject your production variables dynamically into backend/.env
      - name: Create Production .env File
        run: |
          cd backend
          echo "APP_ENV=production" >> .env
          echo "APP_DEBUG=false" >> .env
          echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=${{ secrets.PRODUCTION_DB_HOST }}" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=${{ secrets.PRODUCTION_DB_NAME }}" >> .env
          echo "DB_USERNAME=${{ secrets.PRODUCTION_DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.PRODUCTION_DB_PASS }}" >> .env

      # Step 4: Zip ONLY the contents inside backend/ (React build, .htaccess, vendor, and .env are inside)
      - name: Zip Backend Directory Contents
        run: |
          cd backend
          zip -r ../release.zip .
          cd ..

      # Step 5: Upload the clean release.zip blindly over FTP using an isolated sync state map
      - name: Upload Zip via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.SERVER_DIR }}
          local-dir: ./
          dangerous-clean-slate: false
          state-name: .deploy-zip-state.json