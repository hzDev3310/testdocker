name: Build and Deploy to InfinityFree

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Pull your latest code into the GitHub Runner environment
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up PHP for building the Laravel production vendor folder
      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, pdo-mysql

      # Step 3: Inject Production Secrets into Laravel .env file
      - name: Create Production .env File
        run: |
          cd backend
          echo "APP_ENV=production" >> .env
          echo "APP_DEBUG=false" >> .env
          echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=${{ secrets.PRODUCTION_DB_HOST }}" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=${{ secrets.PRODUCTION_DB_NAME }}" >> .env
          echo "DB_USERNAME=${{ secrets.PRODUCTION_DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.PRODUCTION_DB_PASS }}" >> .env

      # Step 4: Install production PHP dependencies
      - name: Install Laravel Dependencies
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader

      # Step 5: Set up Node.js to compile your React production bundle
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 6: Install React assets and compile them down to static files
      - name: Install and Build React Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # Step 7: Push everything (including the generated .env) straight to InfinityFree over FTP
      - name: Sync Files over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.SERVER_DIR }} # <-- Now completely hidden as a secret variable!