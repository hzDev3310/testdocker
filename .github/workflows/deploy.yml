name: Super-Fast Local Zip Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Create the Production .env file on the fly
      - name: Create Production .env File
        run: |
          cd backend
          echo "APP_ENV=production" >> .env
          echo "APP_DEBUG=false" >> .env
          echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=${{ secrets.PRODUCTION_DB_HOST }}" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=${{ secrets.PRODUCTION_DB_NAME }}" >> .env
          echo "DB_USERNAME=${{ secrets.PRODUCTION_DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.PRODUCTION_DB_PASS }}" >> .env

      # 2. ZIP THE BACKEND FOLDER (Which now contains your React build and Vendor folder)
      - name: Zip Backend Directory
        run: |
          zip -r release.zip backend/

      # 3. Upload the single zip file via FTP
      - name: Upload Zip via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.SERVER_DIR }}
          local-dir: ./